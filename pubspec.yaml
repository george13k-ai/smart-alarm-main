name: app1
description: Smart Alarm App — умный будильник с анализом сна
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications & Alarm
  flutter_local_notifications: ^17.2.4

  # Audio
  audioplayers: ^6.1.0

  # Sensors (для shake game)
  sensors_plus: ^5.0.1

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.3.1

  # Wakelock (не даём телефону заснуть на экране будильника)
  wakelock_plus: ^1.2.8

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  alarm: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
